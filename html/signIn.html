<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <link rel="stylesheet" href="/css/style.css" />

    <!-- the following are for all the icons and they were generated by ai-->

    <!-- Basic Icons -->
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css"
      rel="stylesheet"
    />
    <!-- Filled Icons -->
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css"
      rel="stylesheet"
    />
    <!-- Brand Icons -->
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css"
      rel="stylesheet"
    />
    <script src="/JavaScript/cookies.js"></script>
    <script src="/JavaScript/loadNavBar.js"></script>
  </head>
  <body>
    <!-- 
  this does not have the conf password because you're logging in
  later we will have to do a forgot password screen but later thus in the extra box    
-->

    <main class="sign-main">
      <form action="#">
        <h1>Sign In</h1>

        <label for="name">Full Name</label>
        <div class="input_box">
          <i class="bx bx-user"></i>
          <input
            type="text"
            name="full_name"
            id="name"
            required
            placeholder="full name"
          />
        </div>

        <label for="email">Email Address</label>
        <div class="input_box">
          <i class="bx bx-envelope-open"></i>
          <input
            type="text"
            name="email"
            id="email"
            required
            placeholder="email address"
          />
        </div>

        <label for="password">Password</label>
        <div class="input_box">
          <i class="bx bx-lock-keyhole-open"></i>
          <input
            type="password"
            name="password"
            id="password"
            required
            placeholder="password"
          />
        </div>

        <div class="formButtons">
          <button type="submit" id="done">Sign In</button>
          <button id="autofill">Autofill</button>
          <button onclick="location.href = '/html/index.html'" id="back">
            Back
          </button>
        </div>
        <!--
      the following button will call a java script method to get te email then send an email to reset the password to the user
      -->
      <button onclick="">Forgot password</button>
    </form>
    <script src="../JavaScript/validation.js" defer></script>
  </body>
</html>

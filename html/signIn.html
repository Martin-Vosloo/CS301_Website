<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <link rel="stylesheet" href="../css/sign.css" />

    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
  </head>

  <body>

    <form action="#">
      <h1>Sign In</h1>

      <div class="input_box">
        <label for="email">Email Address</label>
        <i class='bx bxs-envelope'></i> <input type="email" name="email" id="email" required placeholder="Enter your email" />
      </div>

      <div class="input_box">
        <label for="password">Password</label>
        <i class='bx bxs-lock-alt'></i> <input type="password" name="password" id="password" required placeholder="Enter password" />
      </div>

      <div class="formButtons">
        <button type="submit">Sign In</button>
        <button type="button" onclick="location.href = 'index.html'">Back</button>
      </div>

      <p>Don't have an account? <a href="signUp.html">Sign Up</a></p>
    </form>
  </body>
</html>

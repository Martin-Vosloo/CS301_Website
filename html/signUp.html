<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/sign.css">

    
    <!-- the following are for all the icons and they were generated by ai-->>
    <!-- Basic Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <!-- Filled Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css" rel="stylesheet">
    <!-- Brand Icons -->

    <title>Sign Up</title>
    <link rel="stylesheet" href="../css/style_ab.css" />
    <!-- <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    /> -->
  </head>
  <body>

    <form action="#">
      <h1>Sign Up</h1>
      
      <label for="name">Full Name</label>
      <div class="input_box">
        <i class="bx bx-user"></i>
        <input type="text" name="full_name" id="name" required placeholder="full name"/>

      </div>
      
      <label for="email">Email Address</label>
      <div class="input_box">
        <i class="bx bx-envelope-open"></i>
        <input type="text" name="email" id="email" required placeholder="email address"/>
      </div>
      
      <label for="password">Password</label>
      <div class="input_box">
        <i class="bx bx-lock-keyhole-open"></i>
        <input type="password" name="password" id="password" required placeholder="password" />
      </div>
            
      <label for="password_conf">Confirm password</label>
      <div class="input_box">
        <i class="bx bx-lock-keyhole"></i>
        <input type="password" name="password_conf" id="password_conf" required placeholder="confirm your password"/>
      </div>
      
      <div class="formButtons">
        <button type="submit" id="done">Sign Up</button>
        <button onclick="location.href = '/html/index.html'" id="back">Back</button>
      </div>
      
      <p>
        <a href="signIn.html"
          >If you have an account click here. <br>Click here.</a
        >
        <div class="submenu">
          <a href="booking.html">Book a Wedding</a>
          <a href="eventBooking.html">Book an event</a>
        </div>
      </div>
    </nav>

    <footer>
      <p>
        <small>&#169; Copyright 2026 <i>Relationship-Advice</i>&trade;</small
        ><br />
        <small>
          Authors: Dylan McDonogh, Kago Songo, Martin Vosloo, Chuma Modze<br />
          Authors: <a href="about.html">Contact Details</a>
        </small>
      </p>
      
    </form>
  </body>
</html>

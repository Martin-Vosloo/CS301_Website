<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/signUp.css">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <!-- the above link shows an error i will deal with it later-->
    
    <!-- the following are for all the icons and they were generated by ai-->>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    

    <title>Sign Up</title>
  </head>
  <body>
    <form action="#">
      <h1>Sign Up</h1>
      
      <div class="input_box">
        <i class="fa fa-user icon"></i>
        <input type="text" name="full_name" id="name" required placeholder="full name"/>

      </div>
      
      <div class="input_box">
        <i class="fa fa-envelope icon"></i>
        <input type="text" name="email" id="email" required placeholder="email address"/>
      </div>
      
      <div class="input_box">
        <i class="fa fa-key icon"></i>
        <input type="password" name="password" id="password" required placeholder="password" />
      </div>
            
      <div class="input_box">
        <i class="fa fa-key icon"></i>
        <input type="password" name="password_conf" id="password_conf" required placeholder="confirm your password"/>
      </div>
      
      <div class="formButtons">
        <button type="submit" id="done">Sign Up</button>
        <button onclick="location.href = '/html/index.html'" id="back">Back</button>
      </div>
      
      <p>
        <a href="signIn.html"
          >If you have an account click here. <br>Click here.</a
        >
      </p>
      
    </form>
  </body>
</html>
